# Public-facing NGINX: serves the React build, proxies /api to the FastAPI container, terminates TLS.
# NOTE: this file is a server block (loaded from conf.d) — no events/http wrapper needed.

server {
    listen 80;
    server_name nexuscloud.io www.nexuscloud.io;

    # Let’s Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name nexuscloud.io www.nexuscloud.io;

    ssl_certificate     /etc/letsencrypt/live/nexuscloud.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexuscloud.io/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    # Backend API (must keep the /api prefix — the FastAPI routes include it)
    location /api/ {
        proxy_pass         http://api:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # AI/scan calls can take a while
    }

    # React SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
