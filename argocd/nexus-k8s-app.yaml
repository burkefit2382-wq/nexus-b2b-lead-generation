apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexus-k8s
  namespace: argocd
  labels:
    app.kubernetes.io/name: nexus-k8s
    app.kubernetes.io/part-of: nexus-lead-intelligence
spec:
  project: default
  source:
    repoURL: https://github.com/burkefit2382-wq/nexus-b2b-lead-generation.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: nexus
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
