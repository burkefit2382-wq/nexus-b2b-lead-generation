name: Render backend redeploy

on:
  push:
    branches:
      - "develop"
      - "staging"
      - "main"
    paths:
      - "backend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/render-backend-redeploy.yml"
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read

concurrency:
  group: render-backend-redeploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Compile backend entrypoints
        run: |
          python -m py_compile \
            backend/server.py \
            backend/main.py \
            backend/app/main.py \
            backend/app/api/leads.py \
            backend/app/services/hubspot.py

      - name: Run backend tests
        run: PYTHONPATH=. python -m pytest backend/tests -q

  redeploy-dev:
    runs-on: ubuntu-latest
    needs: validate-backend
    environment: Development
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
        (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'dev')
      }}

    steps:
      - name: Trigger Render deploy hook for Development launch site
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_DEV_LAUNCH_SITE_DEPLOY_HOOK }}"

      - name: Trigger Render deploy hook for Development tracking API
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_DEV_TRACKING_API_DEPLOY_HOOK }}"

  redeploy-staging:
    runs-on: ubuntu-latest
    needs: validate-backend
    environment: Staging
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
        (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'staging')
      }}

    steps:
      - name: Trigger Render deploy hook for Staging launch site
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_STAGING_LAUNCH_SITE_DEPLOY_HOOK }}"

      - name: Trigger Render deploy hook for Staging tracking API
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_STAGING_TRACKING_API_DEPLOY_HOOK }}"

  redeploy-prod:
    runs-on: ubuntu-latest
    needs: validate-backend
    environment: Production
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'prod')
      }}

    steps:
      - name: Trigger Render deploy hook for Production launch site
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_PROD_LAUNCH_SITE_DEPLOY_HOOK }}"

      - name: Trigger Render deploy hook for Production tracking API
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_PROD_TRACKING_API_DEPLOY_HOOK }}"