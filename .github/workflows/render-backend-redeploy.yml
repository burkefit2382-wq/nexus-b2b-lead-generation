name: Render backend redeploy

on:
  push:
    branches:
      - "main"
    paths:
      - "backend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/render-backend-redeploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-backend-redeploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Compile backend entrypoints
        run: |
          python -m py_compile \
            backend/server.py \
            backend/main.py \
            backend/app/main.py \
            backend/app/api/leads.py \
            backend/app/services/hubspot.py

      - name: Run backend tests
        run: PYTHONPATH=. python -m pytest backend/tests -q

  redeploy-launch-site:
    runs-on: ubuntu-latest
    needs: validate-backend
    if: ${{ github.ref == 'refs/heads/main' && secrets.RENDER_LAUNCH_SITE_DEPLOY_HOOK != '' }}

    steps:
      - name: Trigger Render deploy hook for launch site
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_LAUNCH_SITE_DEPLOY_HOOK }}"

  redeploy-tracking-api:
    runs-on: ubuntu-latest
    needs: validate-backend
    if: ${{ github.ref == 'refs/heads/main' && secrets.RENDER_TRACKING_API_DEPLOY_HOOK != '' }}

    steps:
      - name: Trigger Render deploy hook for tracking API
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_TRACKING_API_DEPLOY_HOOK }}"
