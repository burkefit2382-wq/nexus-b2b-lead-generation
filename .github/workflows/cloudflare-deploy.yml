name: Cloudflare deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run tests
        run: npm test

      - name: Build frontend bundle
        run: npm --prefix frontend run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Validate Cloudflare deploy secrets
        run: |
          missing=()
          [[ -n "${CLOUDFLARE_API_TOKEN}" ]] || missing+=("CLOUDFLARE_API_TOKEN")
          [[ -n "${CLOUDFLARE_ACCOUNT_ID}" ]] || missing+=("CLOUDFLARE_ACCOUNT_ID")
          if ((${#missing[@]})); then
            echo "::error::Missing Cloudflare deploy secret(s): ${missing[*]}. Configure GitHub Actions secrets before running Cloudflare deploy."
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        run: npm run cf:deploy
