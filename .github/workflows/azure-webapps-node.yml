# NEXUS Intelligence Platform – CI/CD
# Builds the React frontend and FastAPI backend, then deploys both to Azure Web Apps.
#
# Required repository secrets:
#   AZURE_WEBAPP_PUBLISH_PROFILE  – Azure publish profile for the frontend web app
#   AZURE_BACKEND_PUBLISH_PROFILE – Azure publish profile for the backend web app
#
# Required repository variables (or edit the env block below):
#   AZURE_FRONTEND_APP_NAME – name of the Azure Web App for the React frontend
#   AZURE_BACKEND_APP_NAME  – name of the Azure Web App for the FastAPI backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AZURE_FRONTEND_APP_NAME: ${{ vars.AZURE_FRONTEND_APP_NAME || 'nexus-frontend' }}
  AZURE_BACKEND_APP_NAME:  ${{ vars.AZURE_BACKEND_APP_NAME  || 'nexus-backend'  }}
  NODE_VERSION:   '20.x'
  PYTHON_VERSION: '3.12'

permissions:
  contents: read

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm --prefix frontend ci

      - name: Build
        run: npm --prefix frontend run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ── Backend ───────────────────────────────────────────────────────────────
  build-backend:
    name: Build & test backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run tests
        run: PYTHONPATH=. python -m pytest backend/tests -v

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: |
            backend/
            !backend/**/__pycache__
            !backend/**/*.pyc

  # ── Deploy frontend ────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    environment:
      name: production
      url: ${{ steps.deploy-frontend.outputs.webapp-url }}
    permissions:
      contents: none
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy to Azure Web App
        id: deploy-frontend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: dist

  # ── Deploy backend ─────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: build-backend
    environment:
      name: production
      url: ${{ steps.deploy-backend.outputs.webapp-url }}
    permissions:
      contents: none
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: backend

      - name: Deploy to Azure Web App
        id: deploy-backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: backend
