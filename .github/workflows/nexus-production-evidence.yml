name: NEXUS Production Evidence Export

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read
  id-token: write

jobs:
  export-evidence:
    name: Export production evidence artifact
    runs-on: ubuntu-latest
    environment: Production
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || '4bfb6ef1-5cd1-45c1-af2d-1ac9f8c33bd2' }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || '2a9e4c0a-7d39-4898-945c-43628ebb4f54' }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || 'ef5d53d0-d68e-406e-ad7c-4098880bab4f' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Connect to AKS
        run: |
          az aks install-cli
          az aks get-credentials --resource-group nexus-rg --name nexus-aks --overwrite-existing

      - name: Export evidence
        shell: pwsh
        run: ./scripts/export-production-evidence.ps1 -OutputDir evidence/nexus-production/latest

      - name: Upload evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-production-evidence
          path: evidence/nexus-production/latest
