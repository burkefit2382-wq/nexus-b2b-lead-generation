name: Uptime Check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

jobs:
  uptime:
    name: Frontend, backend, checkout, CRM, and webhook reachability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run uptime checks
        run: node scripts/uptime-check.mjs

