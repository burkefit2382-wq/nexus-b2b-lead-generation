name: Deploy to Render

on:
  push:
    branches:
      - main
      - dev

# Prevent concurrent deployments to the same environment.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20.x"

jobs:
  # ── 1. CI gate ─────────────────────────────────────────────────────────
  checks:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        run: PYTHONPATH=. python -m pytest backend/tests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm --prefix frontend run build

  # ── 2. Run database migrations ─────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install migration dependency
        run: python -m pip install "psycopg[binary]>=3.2.0"

      - name: Apply schema migrations
        working-directory: backend
        env:
          DATABASE_URL: >-
            ${{
              github.ref_name == 'main'
              && secrets.DATABASE_URL_PROD
              || secrets.DATABASE_URL_STG
            }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import psycopg

          db_url = os.environ.get("DATABASE_URL", "").strip()
          if not db_url:
              print("DATABASE_URL not set – skipping migration")
              raise SystemExit(0)

          schema = Path("db/schema.sql").read_text(encoding="utf-8")
          with psycopg.connect(db_url) as conn:
              with conn.cursor() as cur:
                  cur.execute(schema)
          print("Schema migration applied successfully")
          PY

  # ── 3a. Deploy staging (dev branch) ────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref_name == 'dev'
    environment:
      name: staging
      url: https://nexus-tracking-api-stg.onrender.com

    steps:
      - name: Trigger Render staging deployment
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_STG_SERVICE_ID }}
        run: |
          response=$(curl --silent --show-error --fail \
            --request POST \
            --header "Authorization: ******" \
            --header "Content-Type: application/json" \
            --data "{\"clearCache\": \"do_not_clear\"}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys")
          echo "Render staging deploy response:"
          echo "${response}" | python3 -m json.tool || echo "${response}"

  # ── 3b. Deploy production (main branch) ────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref_name == 'main'
    environment:
      name: production
      url: https://nexus-tracking-api.onrender.com

    steps:
      - name: Trigger Render production deployment
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_PROD_SERVICE_ID }}
        run: |
          response=$(curl --silent --show-error --fail \
            --request POST \
            --header "Authorization: ******" \
            --header "Content-Type: application/json" \
            --data "{\"clearCache\": \"do_not_clear\"}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys")
          echo "Render production deploy response:"
          echo "${response}" | python3 -m json.tool || echo "${response}"
