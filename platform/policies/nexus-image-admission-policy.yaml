apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: nexus-acr-immutable-images
  labels:
    app.kubernetes.io/name: nexus-acr-immutable-images
    app.kubernetes.io/part-of: nexus-platform
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:
          - apps
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - deployments
      - apiGroups:
          - batch
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - cronjobs
          - jobs
  validations:
    - expression: "object.kind != 'Deployment' || object.spec.template.spec.containers.all(c, c.image.startsWith('crjqmupr2v7hmzm.azurecr.io/') && !c.image.endsWith(':latest'))"
      message: "NEXUS Deployments must use immutable, non-latest images from crjqmupr2v7hmzm.azurecr.io."
    - expression: "object.kind != 'CronJob' || object.spec.jobTemplate.spec.template.spec.containers.all(c, c.image.startsWith('crjqmupr2v7hmzm.azurecr.io/') && !c.image.endsWith(':latest'))"
      message: "NEXUS CronJobs must use immutable, non-latest images from crjqmupr2v7hmzm.azurecr.io."
    - expression: "object.kind != 'Job' || object.spec.template.spec.containers.all(c, c.image.startsWith('crjqmupr2v7hmzm.azurecr.io/') && !c.image.endsWith(':latest'))"
      message: "NEXUS Jobs must use immutable, non-latest images from crjqmupr2v7hmzm.azurecr.io."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: nexus-acr-immutable-images
  labels:
    app.kubernetes.io/name: nexus-acr-immutable-images
    app.kubernetes.io/part-of: nexus-platform
spec:
  policyName: nexus-acr-immutable-images
  validationActions:
    - Deny
  matchResources:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: nexus
