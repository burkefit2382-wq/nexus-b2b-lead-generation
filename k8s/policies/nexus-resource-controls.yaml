apiVersion: v1
kind: ResourceQuota
metadata:
  name: nexus-production-quota
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus-production-quota
    app.kubernetes.io/part-of: nexus-lead-intelligence
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 6Gi
    limits.cpu: "8"
    limits.memory: 12Gi
    pods: "30"
    services: "10"
    secrets: "30"
    configmaps: "30"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: nexus-default-container-limits
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus-default-container-limits
    app.kubernetes.io/part-of: nexus-lead-intelligence
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
      max:
        cpu: "2"
        memory: 2Gi
