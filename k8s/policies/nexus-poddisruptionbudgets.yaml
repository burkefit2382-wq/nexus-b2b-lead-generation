apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nexus-api
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus-api
    app.kubernetes.io/part-of: nexus-lead-intelligence
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nexus-worker
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus-worker
    app.kubernetes.io/part-of: nexus-lead-intelligence
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus-worker
