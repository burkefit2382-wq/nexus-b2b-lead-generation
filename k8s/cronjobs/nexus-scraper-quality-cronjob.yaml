apiVersion: batch/v1
kind: CronJob
metadata:
  name: nexus-osint-scraper-quality
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus-osint-scraper-quality
    app.kubernetes.io/part-of: nexus-lead-intelligence
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: nexus-osint-scraper-quality
            app.kubernetes.io/part-of: nexus-lead-intelligence
        spec:
          restartPolicy: Never
          containers:
            - name: scraper
              image: crjqmupr2v7hmzm.azurecr.io/nexus-api:latest
              imagePullPolicy: IfNotPresent
              workingDir: /app
              command:
                - python
                - workers/tampa_bay_lead_worker.py
                - --delay-seconds
                - "10"
              env:
                - name: NEXUS_SCRAPER_USER_AGENT
                  value: "NexusLeadGen/1.0 buyer-safe OSINT quality scraper"
                - name: NEXUS_SCRAPER_COUNTIES
                  value: "Pinellas,Hillsborough,Pasco,Hernando"
                - name: NEXUS_SCRAPER_TARGETS
                  value: "real_estate,mortgage,insurance,home_services,professional_cleaning,biopharma"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
