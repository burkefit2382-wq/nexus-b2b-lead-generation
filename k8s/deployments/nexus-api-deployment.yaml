apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-api
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus-api
    app.kubernetes.io/part-of: nexus-lead-intelligence
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexus-api
        app.kubernetes.io/part-of: nexus-lead-intelligence
    spec:
      containers:
        - name: nexus-api
          image: acrnexusprodnexus.azurecr.io/nexus-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4173
          env:
            - name: LAUNCH_HOST
              value: "0.0.0.0"
            - name: PORT
              value: "4173"
            - name: PUBLIC_BASE_URL
              value: "https://nexuscloud.sh"
            - name: TRACKING_ALLOWED_ORIGIN
              value: "https://nexuscloud.sh"
            - name: ENVIRONMENT
              value: "production"
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: PRICE_ID
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: PRICE_ID
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: DATABASE_URL
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: RESEND_API_KEY
            - name: RESEND_FROM
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: RESEND_FROM
            - name: WAITLIST_NOTIFY_TO
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: WAITLIST_NOTIFY_TO
            - name: HUBSPOT_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: HUBSPOT_ACCESS_TOKEN
            - name: HUBSPOT_PORTAL_ID
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: HUBSPOT_PORTAL_ID
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
