apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus-ingress
    app.kubernetes.io/part-of: nexus-lead-intelligence
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: nexuscloud.sh
      http:
        paths:
          - path: /hubspot
            pathType: Prefix
            backend:
              service:
                name: nexus-backend
                port:
                  number: 8000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nexus-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-backend
                port:
                  number: 8000
