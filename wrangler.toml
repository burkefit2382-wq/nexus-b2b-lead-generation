name = "raspy-hat-15da"
compatibility_date = "2024-09-23"
main = "worker.js"

[build]
command = "npm run build:worker-assets"

[assets]
directory = "frontend/dist"
binding = "ASSETS"

[vars]
BACKEND_ORIGIN = "https://nexus-b2b-lead-generation.onrender.com"

[[routes]]
pattern = "nexuscloud.sh/*"
zone_name = "nexuscloud.sh"

