name = "raspy-hat-15da"
compatibility_date = "2024-09-23"
main = "worker.js"

# Keep this Worker name aligned with the production service in the target
# Cloudflare account. A mismatched account/service pairing will cause
# `wrangler deploy` to fail with Cloudflare API routing errors.

[build]
command = "npm --prefix frontend install && npm --prefix frontend run build"

[assets]
directory = "frontend/dist"
binding = "ASSETS"

# Optional custom domain template (disabled by default).
# Uncomment and set your real hostname (e.g. app.example.com) to enable.
# [[custom_domains]]
# hostname = "app.example.com"
