services:
  - type: web
    name: nexus-launch-site
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py"
    healthCheckPath: "/healthz"
    envVars:
      - key: LAUNCH_HOST
        value: "0.0.0.0"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: WAITLIST_NOTIFY_TO
        sync: false

