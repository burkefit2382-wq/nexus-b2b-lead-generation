services:
  - type: web
    name: nexus-launch-site
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    healthCheckPath: "/healthz"
    envVars:
      - key: LAUNCH_HOST
        value: "0.0.0.0"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: EMAIL_DOMAIN
        value: "mail.nexuscloud.sh"
      - key: LLAMA_CHAT_ENDPOINT
        sync: false
      - key: LLAMA_CHAT_MODEL
        value: "llama3"
      - key: LLAMA_CHAT_API_KEY
        sync: false
      - key: LLAMA3_CHAT_ENDPOINT
        sync: false
      - key: LLAMA3_CHAT_MODEL
        sync: false
      - key: LLAMA3_API_KEY
        sync: false
      - key: OLLAMA_HOST
        sync: false
      - key: OLLAMA_MODEL
        sync: false
      - key: WAITLIST_NOTIFY_TO
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: STRIPE_API_VERSION
        value: "2026-06-24.dahlia"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PRICE_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: HUBSPOT_SERVICE_KEY
        sync: false
      - key: HUBSPOT_PRIVATE_APP_TOKEN
        sync: false
      - key: HUBSPOT_API_KEY
        sync: false
      - key: HUBSPOT_PORTAL_ID
        sync: false
  - type: web
    name: nexus-tracking-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    healthCheckPath: "/health"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TRACKING_ALLOWED_ORIGIN
        value: "*"
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: HUBSPOT_SERVICE_KEY
        sync: false
      - key: HUBSPOT_PRIVATE_APP_TOKEN
        sync: false
      - key: HUBSPOT_API_KEY
        sync: false
      - key: HUBSPOT_PORTAL_ID
        sync: false
  - type: cron
    name: nexus-osint-scraper-quality
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python workers/tampa_bay_lead_worker.py --delay-seconds 10"
    schedule: "0 */6 * * *"
    envVars:
      - key: NEXUS_SCRAPER_USER_AGENT
        value: "NexusLeadGen/1.0 buyer-safe OSINT quality scraper"
      - key: NEXUS_SCRAPER_COUNTIES
        value: "Pinellas,Hillsborough,Pasco,Hernando"
      - key: NEXUS_SCRAPER_TARGETS
        value: "real_estate,mortgage,insurance,home_services,professional_cleaning"
