services:
  - type: web
    name: nexus-launch-site
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    healthCheckPath: "/healthz"
    envVars:
      - key: LAUNCH_HOST
        value: "0.0.0.0"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: EMAIL_DOMAIN
        value: "mail.nexuscloud.sh"
      - key: WAITLIST_NOTIFY_TO
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: STRIPE_API_VERSION
        value: "2026-06-24.dahlia"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PRICE_ID
        sync: false
  - type: cron
    name: nexus-osint-scraper-quality
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python workers/tampa_bay_lead_worker.py --delay-seconds 10"
    schedule: "0 */6 * * *"
    envVars:
      - key: NEXUS_SCRAPER_USER_AGENT
        value: "NexusLeadGen/1.0 buyer-safe OSINT quality scraper"
      - key: NEXUS_SCRAPER_COUNTIES
        value: "Pinellas,Hillsborough,Pasco,Hernando"
      - key: NEXUS_SCRAPER_TARGETS
        value: "real_estate,mortgage,insurance,home_services,professional_cleaning"
